<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Davita Bros. Sounds | Premium Royalty Free Music</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // פרטי ה-Firebase מוטמעים ישירות כדי למנוע בעיות טעינה ב-Vercel
        const firebaseConfig = {
          "apiKey": "AIzaSyBtdqx8EHV5sYf3-0rQ_srhvx1rAe1V3Hg",
          "authDomain": "davita-bros.firebaseapp.com",
          "projectId": "davita-bros",
          "storageBucket": "davita-bros.firebasestorage.app",
          "messagingSenderId": "394076755818",
          "appId": "1:394076755818:web:4ab6bac7480deeca3df713",
          "measurementId": "G-E691HH7RBZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "davita-bros-sounds";

        window.db = db;
        window.auth = auth;
        window.appId = appId;
        window.firestoreTools = { collection, addDoc, onSnapshot, query, deleteDoc, doc };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Authenticated as:", user.uid);
                hideLoader();
                window.dispatchEvent(new CustomEvent('firebaseReady'));
            } else {
                signInAnonymously(auth).catch(() => hideLoader());
            }
        });

        function hideLoader() {
            const loader = document.getElementById('loadingOverlay');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        }
        // הגנה מפני טעינה אינסופית - מסיר את המסך אחרי 6 שניות בכל מקרה
        setTimeout(hideLoader, 6000);
    </script>

    <!-- UI - Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], display: ['Syne', 'sans-serif'] },
                    colors: { brand: { dark: '#0a0d14', orange: '#f59e0b', accent: '#f97316' } }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0a0d14; color: #f8fafc; overflow-x: hidden; }
        .font-display { font-family: 'Syne', sans-serif; }
        .glass-card { background: rgba(26, 31, 46, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .logo-img { height: 44px; width: auto; object-fit: contain; }
        .track-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .track-card:hover { transform: translateY(-8px); border-color: rgba(245, 158, 11, 0.4); }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingOverlay" class="fixed inset-0 bg-brand-dark z-[200] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="flex gap-2 mb-6">
            <div class="w-4 h-12 bg-brand-orange animate-bounce"></div>
            <div class="w-4 h-16 bg-brand-accent animate-bounce" style="animation-delay: 0.1s"></div>
            <div class="w-4 h-10 bg-brand-orange/40 animate-bounce" style="animation-delay: 0.2s"></div>
        </div>
        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em] animate-pulse">Initializing Library...</p>
    </div>

    <!-- Nav Bar -->
    <header class="sticky top-0 z-50 glass-card py-4 border-b border-white/5">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="switchView('store')">
                <img src="logo.jpg" alt="Logo" class="logo-img" onerror="this.src='logo.jpg.jpg'; this.onerror=function(){this.style.display='none'; document.getElementById('text-logo').style.display='block'}">
                <h1 id="text-logo" class="hidden text-2xl font-black text-white font-display uppercase tracking-tighter">DAVITA <span class="text-brand-orange">BROS.</span></h1>
            </div>
            <nav class="flex gap-8 items-center text-[10px] font-black uppercase tracking-widest">
                <a href="javascript:void(0)" onclick="switchView('store')" class="hover:text-brand-orange transition">Store</a>
                <a href="javascript:void(0)" onclick="switchView('dashboard')" class="text-brand-orange/60 hover:text-brand-orange transition flex items-center gap-2"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Admin</a>
            </nav>
        </div>
    </header>

    <!-- STORE VIEW -->
    <main id="storeView" class="view-section active">
        <section class="py-32 text-center container mx-auto px-6">
            <h2 class="text-6xl md:text-8xl font-black font-display uppercase mb-6 leading-none text-white tracking-tighter">
                Premium <br/> <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-orange to-brand-accent">Royalty Free</span>
            </h2>
            <p class="text-slate-500 max-w-xl mx-auto text-lg mb-20 italic">Curated high-fidelity sounds for creators.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="musicGrid">
                <!-- Tracks will load here -->
            </div>
        </section>
    </main>

    <!-- ADMIN DASHBOARD -->
    <main id="dashboardView" class="view-section container mx-auto px-6 py-16">
        <div class="flex justify-between items-end mb-12">
            <h2 class="text-4xl font-black font-display uppercase text-white tracking-tighter">Cloud <span class="text-brand-orange">Manager</span></h2>
            <button onclick="switchView('store')" class="text-[10px] font-black text-slate-500 hover:text-white uppercase tracking-[0.2em]">Exit to Store</button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <!-- Add Form -->
            <div class="glass-card p-10 rounded-[2.5rem] h-fit">
                <h3 class="text-xl font-bold mb-8 font-display text-white uppercase tracking-tight">New Release</h3>
                <form id="addTrackForm" class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Track Title</label>
                        <input type="text" id="newTrackName" placeholder="e.g. French Jazz" required class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none focus:border-brand-orange transition">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Filename (Slug)</label>
                        <input type="text" id="newTrackSlug" placeholder="e.g. 40s%20french%20jazz" required class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none focus:border-brand-orange transition">
                    </div>
                    <button type="submit" class="w-full bg-brand-orange text-black py-5 rounded-2xl font-black uppercase text-xs tracking-[0.2em] mt-4 hover:bg-brand-accent transition shadow-xl shadow-brand-orange/20">Publish to Live Site</button>
                </form>
            </div>
            
            <!-- List View -->
            <div class="lg:col-span-2 glass-card p-10 rounded-[2.5rem]">
                <h3 class="text-xl font-bold mb-8 font-display text-white uppercase tracking-tight">Live Library</h3>
                <div id="adminTrackList" class="space-y-4">
                    <!-- Admin tracks will load here -->
                </div>
            </div>
        </div>
    </main>

    <audio id="globalAudioPlayer"></audio>

    <script type="module">
        const IMG_BASE = "https://pub-a14abfa301934c3788527e6064f93a2f.r2.dev/davitabrosclub/";

        window.addEventListener('firebaseReady', () => {
            startSync();
        });

        function startSync() {
            const { collection, onSnapshot, query } = window.firestoreTools;
            const q = query(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'tracks'));
            
            onSnapshot(q, (snapshot) => {
                const tracks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderUI(tracks);
            });
        }

        function renderUI(data) {
            const grid = document.getElementById('musicGrid');
            const adminList = document.getElementById('adminTrackList');
            
            if (grid) {
                if (data.length === 0) {
                    grid.innerHTML = '<div class="col-span-full py-20 text-slate-600 italic">Library is empty. Add tracks from the dashboard.</div>';
                } else {
                    grid.innerHTML = data.map(t => `
                        <article class="track-card glass-card rounded-[3rem] p-8 border border-white/5">
                            <div class="aspect-square rounded-[2rem] bg-brand-dark mb-8 overflow-hidden relative group">
                                <img src="${IMG_BASE}${t.slug}.jpg" class="w-full h-full object-cover opacity-70 group-hover:scale-110 transition duration-700" onerror="this.src='https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500'">
                                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                                    <div class="bg-brand-orange p-5 rounded-full text-black shadow-2xl cursor-pointer">
                                        <i data-lucide="play" class="fill-current"></i>
                                    </div>
                                </div>
                            </div>
                            <h4 class="font-bold text-xl text-white font-display uppercase tracking-tight">${t.title}</h4>
                            <p class="text-[10px] font-black text-slate-500 uppercase mt-4 tracking-[0.2em]">Preview MP3 Ready</p>
                        </article>
                    `).join('');
                }
            }

            if (adminList) {
                adminList.innerHTML = data.map(t => `
                    <div class="bg-white/5 p-6 rounded-2xl flex justify-between items-center border border-white/5 hover:border-white/10 transition">
                        <div>
                            <p class="text-white font-bold tracking-tight">${t.title}</p>
                            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-1">${t.slug}</p>
                        </div>
                        <button onclick="window.removeTrack('${t.id}')" class="text-red-500/50 hover:text-red-500 transition p-3">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        window.removeTrack = async function(id) {
            if (!confirm("Remove this track from the cloud?")) return;
            const { doc, deleteDoc } = window.firestoreTools;
            await deleteDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'tracks', id));
        };

        window.switchView = function(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(view + 'View').classList.add('active');
            window.scrollTo(0,0);
        };

        document.getElementById('addTrackForm').onsubmit = async (e) => {
            e.preventDefault();
            const { collection, addDoc } = window.firestoreTools;
            const title = document.getElementById('newTrackName').value;
            const slug = document.getElementById('newTrackSlug').value;
            
            try {
                await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'tracks'), {
                    title, slug, createdAt: Date.now()
                });
                e.target.reset();
            } catch (err) {
                alert("Cloud Error: " + err.message);
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
